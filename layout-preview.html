<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GO60 Layers</title>
</head>
<body>
<div id="go60-layer-map">
  <div class="viz-controls" id="go60-layer-controls" aria-label="GO60 layer"></div>
  <div class="viz-row go60-meta">
    <span id="go60-layer-status" aria-live="polite"></span>

  </div>
  <svg id="go60-board" viewBox="0 0 1070 410" role="img"></svg>

<style>
  :root {
    color-scheme: light dark;
    --background: light-dark(rgb(255 255 255), rgb(24 24 24));
    --foreground: light-dark(rgb(26 28 31), rgb(255 255 255));
    --muted: light-dark(rgb(26 28 31 / 10%), rgb(255 255 255 / 10%));
    --muted-foreground: light-dark(rgb(26 28 31 / 55%), rgb(255 255 255 / 55%));
    --border: light-dark(rgb(26 28 31 / 16%), rgb(255 255 255 / 16%));
    --primary: light-dark(rgb(51 156 255), rgb(131 195 255));
    --primary-foreground: light-dark(rgb(255 255 255), rgb(13 13 13));
    --font-size-base: 16px;
  }
  * { box-sizing: border-box; }
  body {
    background: var(--background);
    color: var(--foreground);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: var(--font-size-base);
    margin: 0;
    padding: 1rem;
  }
  .viz-controls, .viz-row { align-items: center; display: flex; flex-wrap: wrap; gap: 0.5rem; }
  .btn {
    background: var(--muted);
    border: 1px solid var(--border);
    border-radius: 0.5rem;
    color: var(--foreground);
    cursor: pointer;
    font: inherit;
    padding: 0.4rem 0.7rem;
  }
  .btn[aria-pressed="true"] { background: var(--primary); color: var(--primary-foreground); }
  .text-small { font-size: 0.85rem; }
  .text-muted { color: var(--muted-foreground); }
  #go60-layer-map { color: var(--foreground); width: 100%; }
  #go60-layer-map .go60-meta { justify-content: space-between; margin: 0.75rem 0 0.35rem; }
  #go60-layer-map #go60-layer-status { font-weight: 500; }
  #go60-layer-map #go60-board { display: block; height: auto; width: 100%; }
  #go60-layer-map .go60-key { stroke: var(--border); stroke-width: 1.5; }
  #go60-layer-map .go60-key-label { font-weight: 500; pointer-events: none; }
  #go60-layer-map .go60-key-primary { font-size: calc(var(--font-size-base) * 0.82); }
  #go60-layer-map .go60-key-secondary { font-size: calc(var(--font-size-base) * 0.55); font-weight: 400; }
  #go60-layer-map .go60-key-hold { font-size: calc(var(--font-size-base) * 0.48); }
  #go60-layer-map .go60-key-corner { font-size: calc(var(--font-size-base) * 0.68); }
  #go60-layer-map .go60-key-icon { fill: none; stroke-linecap: round; stroke-linejoin: round; stroke-width: 1.8; }
  #go60-layer-map .go60-inherited { fill: var(--muted-foreground); }
  body.go60-snapshot { color-scheme: light; padding: 0; }
  body.go60-snapshot .viz-controls, body.go60-snapshot .go60-meta { display: none; }
</style>

      const expression = binding.slice(4);
      const modifier = modifiers[expression];
      return keycodeLegends[expression] || (modifier ? legend(modifier.symbol, modifier.name) : legend(formatKeycode(expression)));
    }
    if (binding.startsWith("&sk ")) {
      const expression = binding.slice(4);
      const modifier = modifiers[expression];
      return modifier ? legend(modifier.symbol, modifier.name + " Sticky") : legend(formatKeycode(expression), "Sticky");
    }
    if (binding.startsWith("&HRM_")) {
      const parts = binding.split(" ");
      const modifier = modifiers[parts.at(-2)];
      return legend(formatKeycode(parts.at(-1)), modifier?.name || formatKeycode(parts.at(-2)), "", modifier?.symbol || "");
    }
    if (binding.startsWith("&lt ")) {
      const [, index, key] = binding.split(" ");
      return legend(formatKeycode(key), "Hold→" + formatLayer(index));
    }
    if (binding.startsWith("&layer ")) return legend("⇧", formatLayer(binding.split(" ")[1]));
    if (binding.startsWith("&to ")) return legend("↦", formatLayer(binding.split(" ")[1]));
    if (binding.startsWith("&rgb_ug ")) {
      const action = binding.split(" ")[1];
      const rgb = {RGB_SPI:["+","Speed","gauge"],RGB_SPD:["−","Speed","gauge"],RGB_SAI:["+","Saturation","droplet"],RGB_SAD:["−","Saturation","droplet"],RGB_HUI:["+","Hue","palette"],RGB_HUD:["−","Hue","palette"],RGB_BRI:["+","Brightness","lightbulb"],RGB_BRD:["−","Brightness","lightbulb"],RGB_TOG:["","RGB On / Off","power"],RGB_EFF:["","RGB Effect","sparkles"]}[action];
      return legend(...rgb);
    }
    if (binding.startsWith("&bt ")) return legend("", binding.includes("ALL") ? "Clear All" : "Clear", "bluetooth", "×");
    if (/^&bt_\d$/.test(binding)) return legend("", "Profile", "bluetooth", binding.at(-1));
    if (binding === "&out OUT_USB") return legend("", "USB", "usb");
    if (binding.startsWith("&mod_tab")) return legend("⇥", "Command Tab", "", "⌘");
    if (binding.includes("SELECT_LINE")) return legend("Select", "Line");
    if (binding.includes("SELECT_WORD")) return legend("Select", "Word");
    if (binding.includes("SELECT_NONE")) return legend("Select", "None");
    if (binding.includes("EXTEND_LINE")) return legend("Extend", "Line");
    if (binding.includes("EXTEND_WORD")) return legend("Extend", "Word");
    return legend(binding.replace(/^&/, "").replaceAll("_", " "));
  };
  const textColor = color => {
    if (!color) return "var(--foreground)";
    const value = color.slice(1);
    const red = parseInt(value.slice(0, 2), 16);
    const green = parseInt(value.slice(2, 4), 16);
    const blue = parseInt(value.slice(4, 6), 16);
    return (red * 299 + green * 587 + blue * 114) / 1000 > 150 ? "#000000" : "#ffffff";
  };
  const svgElement = name => document.createElementNS("http://www.w3.org/2000/svg", name);
  const appendText = (parent, value, className, x, y) => {
    if (!value) return;
    const text = svgElement("text");
    text.setAttribute("class", "go60-key-label " + className);
    text.setAttribute("x", x);
    text.setAttribute("y", y);
    text.setAttribute("text-anchor", "middle");
    text.textContent = value.length > 12 ? value.slice(0, 11) + "…" : value;
    parent.append(text);
  };
  const appendIcon = (parent, name, color, hasSecondary) => {
    const icon = svgElement("g");
    icon.setAttribute("class", "go60-key-icon");
    icon.setAttribute("stroke", color);
    icon.setAttribute("transform", "translate(15 " + (hasSecondary ? 5 : 15) + ")");
    iconPaths[name].forEach(pathData => {
      const path = svgElement("path");
      path.setAttribute("d", pathData);
      icon.append(path);
    });
    parent.append(icon);
  };
  const render = index => {
    const layer = layers[index];
    controls.querySelectorAll("button").forEach((button, buttonIndex) => button.setAttribute("aria-pressed", String(buttonIndex === index)));
    status.textContent = (index + 1) + " · " + (layer.colors ? layer.name + " · Custom Device-tree RGB override" : layer.name + " · No per-layer RGB override");
    board.replaceChildren();
    const title = svgElement("title");
    title.textContent = layer.name + " layer";
    const description = svgElement("desc");
    description.textContent = "Physical GO60 layout showing resolved bindings and explicit per-key RGB colors.";
    board.append(title, description);
    layer.bindings.forEach((binding, keyIndex) => {
      const position = positions[keyIndex];
      const color = layer.colors?.[keyIndex];
      const inherited = layer.own[keyIndex] === "0";
      const group = svgElement("g");
      group.setAttribute("transform", "translate(" + (position.x * 60 + 10) + " " + (position.y * 60 + 10) + ") rotate(" + position.r + " 27 27)");
      group.setAttribute("aria-label", keyNames[keyIndex] + ": " + binding + (inherited ? ", inherited" : ""));
      const keyTitle = svgElement("title");
      keyTitle.textContent = keyNames[keyIndex] + " · " + binding + (inherited ? " · inherited" : "");
      const rect = svgElement("rect");
      rect.setAttribute("class", "go60-key");
      rect.setAttribute("width", "54");
      rect.setAttribute("height", "54");
      rect.setAttribute("rx", "8");
      rect.setAttribute("fill", color || "var(--muted)");
      const keyColor = textColor(color);
      const keyLegend = formatBinding(binding);
      group.setAttribute("fill", keyColor);
      group.append(keyTitle, rect);
      if (keyLegend.icon) appendIcon(group, keyLegend.icon, keyColor, Boolean(keyLegend.secondary));
      if (keyLegend.primary) appendText(group, keyLegend.primary, "go60-key-primary", keyLegend.icon ? "40" : "27", keyLegend.secondary ? "27" : "32");
      if (keyLegend.secondary) appendText(group, keyLegend.secondary, "go60-key-secondary" + (binding.startsWith("&lt ") ? " go60-key-hold" : ""), "27", "46");
      if (keyLegend.corner) appendText(group, keyLegend.corner, "go60-key-corner", "44", "14");
      if (inherited) {
        const marker = svgElement("circle");
        marker.setAttribute("class", "go60-inherited");
        marker.setAttribute("cx", "47");
        marker.setAttribute("cy", "7");
        marker.setAttribute("r", "2.5");
        group.append(marker);
      }
      board.append(group);
    });
  };
  layers.forEach((layer, index) => {
    const button = document.createElement("button");
    button.type = "button";
    button.className = "btn";
    button.textContent = (index + 1) + " · " + layer.name;
    button.setAttribute("aria-label", "Layer " + (index + 1) + ": " + layer.name);
    button.addEventListener("click", () => render(index));
    controls.append(button);
  });
  document.addEventListener("keydown", event => {
    const index = Number(event.key) - 1;
    if (index >= 0 && index < layers.length) render(index);
  });
  render(Number(parameters.get("layer") || 0));
})();
</script>
</body>
</html>
